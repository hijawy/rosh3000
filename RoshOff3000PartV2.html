<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rosh Review 3000</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { box-sizing: border-box; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    body {
      margin: 0;
      padding: 10px;
      background: #f4f7fa;
      color: #333;
    }

    @keyframes bouncePulse {
      0% { transform: scale(1.5); }
      50% { transform: scale(1.58); }
      100% { transform: scale(1.5); }
    }
    .bounce-active { animation: bouncePulse 0.2s ease; }

    h2 { text-align: center; margin: 60px 0 20px; font-size: 1.8em; }

    .nav-tob {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      background: #e0e0e0;
      padding: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      z-index: 1000;
    }

    .nav-tabs {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-around;
      background: #e0e0e0;
      padding: 8px;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.12);
      z-index: 1000;
    }
    .nav-tabs button {
      flex: 1;
      margin: 0 2px;
      font-size: 1.1em;
    }

    button {
      padding: 8px 14px;
      font-size: 1em;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #2980b9; }

    .resizer {
      width: 100%;
      height: 68vh;
      min-height: 500px;
      border: 1px solid #bbb;
      background: white;
      resize: both;
      overflow: auto;
      margin: 20px 0 100px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin: 20px auto;
      max-width: 900px;
    }

    canvas { max-width: 160px; max-height: 160px; }

    #notePanel { display: none; margin: 10px 0; }
    textarea { width: 100%; padding: 10px; font-size: 1em; margin: 8px 0; }

    .sidebar-toggle {
      position: fixed;
      top: 12px;
      left: 12px;
      font-size: 2.2em;
      cursor: pointer;
      z-index: 2000;
      color: #444;
    }

    .sidebar-menu {
      position: fixed;
      top: 0; left: -260px;
      width: 260px;
      height: 100%;
      background: white;
      border-right: 1px solid #ddd;
      box-shadow: 3px 0 10px rgba(0,0,0,0.15);
      padding: 20px;
      transition: left 0.3s ease;
      z-index: 1999;
      overflow-y: auto;
    }
    .sidebar-menu.open { left: 0; }

    label { user-select: none; cursor: pointer; margin: 6px 0; display: block; }

    #questionNumbers { text-align:center; margin: 20px 10px; font-weight:bold; font-size: 1.1em; }

    #progress-bar { width: 100%; height: 24px; margin: 10px 0; display: none; }
    #timer, #stats { text-align: center; font-weight: bold; margin: 8px 0; }
  </style>
</head>
<body>

  <div class="sidebar-toggle" onclick="toggleSidebar()">☰</div>

  <div id="sidebarMenu" class="sidebar-menu">
    <h3>Show Controls</h3>
    <label><input type="checkbox" onchange="toggleButton('btn-generate');toggleButton('lbl-generate');toggleButton('numQuestions')"> 🎲 Generate questions</label>
    <label><input type="checkbox" onchange="toggleButton('btn-save')"> 💾 Save progress</label>
    <label><input type="checkbox" onchange="toggleButton('btn-load')"> 📂 Load progress</label>
    <label><input type="checkbox" onchange="toggleButton('btn-timer')"> ⏱ Timer</label>
    <label><input type="checkbox" onchange="toggleButton('btn-correct')"> ✅ Correct</label>
    <label><input type="checkbox" onchange="toggleButton('btn-wrong')"> ❌ Wrong</label>
    <label><input type="checkbox" onchange="toggleButton('btn-prev')"> ⬅ Previous</label>
    <label><input type="checkbox" onchange="toggleButton('btn-next')"> ➡️ Next</label>
    <label><input type="checkbox" onchange="toggleButton('btn-note');toggleButton('btn-note2')"> 📝 Note</label>
    <label><input type="checkbox" onchange="toggleButton('lbl-go');toggleButton('gotoQ');toggleButton('btn-go')"> Go to question #</label>
    <label><input type="checkbox" onchange="toggleButton('btn-load-prev')"> 📂 LoadOldQ (avoid repeats)</label>
    <label><input type="checkbox" onchange="toggleButton('btn-save-merged')"> 💾 SaveAllQ (merge)</label>

    <hr style="margin:20px 0;">
    <input type="text" id="searchInput" placeholder="Search keyword..." style="width:100%; padding:8px;" />
    <button onclick="searchInFiles()" style="margin-top:10px; width:100%;">Search in files</button>
    <div id="searchResults" style="margin-top:15px; max-height:300px; overflow-y:auto;"></div>
    <div id="progressBarContainer" style="margin:15px 0; display:none;">
      <progress id="progress-bar" value="0" max="100"></progress>
      <div id="etaText" style="text-align:center; font-size:0.9em; color:#555;"></div>
    </div>
  </div>

  <h2>Rosh Review 3000</h2>

  <div class="nav-tob" style="display:flex; flex-wrap:wrap; gap:8px;">
    <span id="lbl-generate" style="display:none;">Questions:</span>
    <input type="number" id="numQuestions" value="100" min="1" max="3007" style="width:90px; display:none;" />
    <button id="btn-generate" onclick="generateQuestions()" style="display:none;">🎲 Generate</button>

    <button id="btn-save" onclick="saveProgressToFile()" style="display:none;">💾 Save</button>
    <button id="btn-load" onclick="LoadProgressfromFile()" style="display:none;">📂 Load</button>
    <button id="btn-timer" onclick="startTimer(generatedQuestions.length)" style="display:none;">⏱ Timer</button>

    <button id="btn-correct" onclick="markAnswer(true)" style="display:none;">✅ Correct</button>
    <button id="btn-wrong" onclick="markAnswer(false)" style="display:none;">❌ Wrong</button>

    <button id="btn-prev" onclick="previousQuestion()" style="display:none;">⬅ Previous</button>
    <button id="btn-next" onclick="nextQuestion()" style="display:none;">➡️ Next</button>

    <span id="lbl-go" style="display:none;">Go to:</span>
    <input type="number" id="gotoQ" value="1" min="1" style="width:70px; display:none;" />
    <button id="btn-go" onclick="gotoQuestion()" style="display:none;">Go</button>

    <button id="btn-note" onclick="toggleNotePanel()" style="display:none;">📝 Note</button>
  </div>

  <div id="notePanel" style="display:none; margin: 20px 10px;">
    <textarea id="noteArea" rows="5" placeholder="Your notes..."></textarea>
  </div>

  <div id="questionNumbers" style="text-align:center; margin:20px 10px; font-weight:bold;"></div>
  <iframe id="questionFrame" class="resizer"></iframe>

  <textarea id="answerBox" rows="2" placeholder="Answer summary..." style="width:100%; margin:10px 0;"></textarea>

  <div class="container">
    <div id="stats" style="min-width:220px;"></div>
    <canvas id="statsChart"></canvas>
    <div id="timer" style="font-size:1.3em;"></div>
  </div>

  <textarea id="answerBox2" rows="2" placeholder="Extra notes..." style="width:100%; margin-bottom:100px;"></textarea>

  <div class="nav-tabs">
    <button onclick="previousQuestion()">⬅ Prev</button>
    <button onclick="nextQuestion()">Next ➡️</button>
    <button id="btn-note2" onclick="toggleNotePanel()" style="display:none;">📝</button>
    <button id="btn-load-prev" onclick="loadPreviousQuestions()" style="display:none;">📂 LoadOldQ</button>
    <button id="btn-save-merged" onclick="saveMergedQuestions()" style="display:none;">💾 SaveAllQ</button>
    <button id="btn-save" onclick="saveProgressToFile()" style="display:none;">💾 Save</button>
  </div>

  <script>
    // ──────────────────────────────
    //   All toggle logic
    // ──────────────────────────────
    function toggleButton(id) {
      const el = document.getElementById(id);
      if (el) {
        el.style.display = el.style.display === "none" ? "" : "none";
      }
    }

    // Make sure bottom nav note/load/save buttons follow sidebar checkboxes
    document.querySelectorAll('#sidebarMenu input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => {
        // You can add extra logic here if needed for bottom buttons
      });
    });

    // Rest of your script remains almost the same
    let questionIndex = 0;
    let generatedQuestions = [];
    let correctAnswers = 0;
    let wrongAnswers = 0;
    let previousQuestions = [];

    const timerEl = document.getElementById("timer");
    const statsEl = document.getElementById("stats");

    function getFolder(num) {
      if (num <= 399) return 1;
      if (num <= 799) return 2;
      if (num <= 1199) return 3;
      if (num <= 1599) return 4;
      if (num <= 1999) return 5;
      if (num <= 2399) return 6;
      if (num <= 2799) return 7;
      return 8;
    }

    function generateQuestions() {
      const num = Math.min(parseInt(document.getElementById('numQuestions').value) || 100, 3007);
      const used = new Set(previousQuestions);
      generatedQuestions = [];

      while (generatedQuestions.length < num) {
        const rand = Math.floor(Math.random() * 3007) + 1;
        if (!used.has(rand)) {
          used.add(rand);
          generatedQuestions.push(rand);
        }
      }

      questionIndex = 0;
      displayQuestion();
    }

    function displayQuestion() {
      if (!generatedQuestions.length) return;
      const qNum = generatedQuestions[questionIndex];
      const folder = getFolder(qNum);
      const path = `${folder}/${qNum}.html`;

      document.getElementById('questionNumbers').innerHTML = 
        `Current: <a href="${path}" target="_blank">${qNum}</a>  (${questionIndex+1} / ${generatedQuestions.length})`;

      document.getElementById('questionFrame').src = path;
    }

    function previousQuestion() {
      if (questionIndex > 0) {
        questionIndex--;
        displayQuestion();
      }
    }

    function nextQuestion() {
      if (questionIndex < generatedQuestions.length - 1) {
        questionIndex++;
        displayQuestion();
      }
    }

    function gotoQuestion() {
      const target = parseInt(document.getElementById('gotoQ').value) - 1;
      if (target >= 0 && target < generatedQuestions.length) {
        questionIndex = target;
        displayQuestion();
      }
    }

    function markAnswer(isCorrect) {
      if (isCorrect) correctAnswers++;
      else wrongAnswers++;
      document.getElementById('answerBox').value += 
        `Q${questionIndex+1}: ${isCorrect ? "Correct" : "Wrong"}    `;
      displayStats();
    }

    function displayStats() {
      const total = correctAnswers + wrongAnswers;
      const pctCorrect = total ? Math.round((correctAnswers / total) * 100) : 0;
      statsEl.textContent = `Answered: ${total}   ✅ ${pctCorrect}%   ❌ ${100-pctCorrect}%`;

      const ctx = document.getElementById('statsChart').getContext('2d');
      if (window.myChart) window.myChart.destroy();

      window.myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Correct', 'Wrong'],
          datasets: [{ data: [pctCorrect, 100-pctCorrect], backgroundColor: ['#4CAF50', '#F44336'], borderWidth: 0 }]
        },
        options: { cutout: '75%', plugins: { legend: { display: false } }, animation: { duration: 1200 } }
      });
    }

    // ... (keep your other functions: startTimer, toggleNotePanel, save/load, merge logic, searchInFiles ...)

    // Only change here is that we DON'T auto-show anything on load
    // Everything stays hidden until checkboxes are ticked

    document.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        btn.classList.add("bounce-active");
        setTimeout(() => btn.classList.remove("bounce-active"), 400);
      });
    });

    function toggleSidebar() {
      document.getElementById("sidebarMenu").classList.toggle("open");
    }

    document.addEventListener('click', e => {
      const menu = document.getElementById('sidebarMenu');
      const toggle = document.querySelector('.sidebar-toggle');
      if (menu.classList.contains('open') && !menu.contains(e.target) && !toggle.contains(e.target)) {
        menu.classList.remove('open');
      }
    });
  </script>
</body>
</html>
